name: Update podcast episodes

on:
  workflow_dispatch:

  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-episodes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch podcast episodes
        run: python scripts/update_podcast_episodes.py

      - name: Commit updated episode data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/data/podcast-episodes.json

          if git diff --cached --quiet; then
            echo "No podcast changes found."
            exit 0
          fi

          git commit -m "Update podcast episodes"
          git push
