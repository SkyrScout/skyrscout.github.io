name: Notify WebSub

on:
  push:
    branches:
      - main
    paths:
      - "_players/**"
      - "_shorts/**"
      - "_update_posts/**"
      - "feed.xml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-websub:
    runs-on: ubuntu-latest

    steps:

      - name: Wait for updated SkyrScout feed
        env:
          FEED_URL: "https://skyrscout.github.io/feed.xml"
          COMMIT_SHA: "${{ github.sha }}"
        run: |
          set -euo pipefail

          echo "Waiting for GitHub Pages to publish commit:"
          echo "$COMMIT_SHA"

          for attempt in {1..30}; do

            feed="$(curl -fsSL --retry 2 --retry-delay 2 "$FEED_URL" || true)"

            if printf '%s' "$feed" | grep -q "$COMMIT_SHA"; then
              echo "Published feed contains the current commit."
              exit 0
            fi

            echo "Attempt $attempt/30: new feed not published yet."
            sleep 20

          done

          echo "The updated feed was not published within 10 minutes."
          exit 1


      - name: Notify WebSub hub
        env:
          FEED_URL: "https://skyrscout.github.io/feed.xml"
        run: |
          set -euo pipefail

          status="$(
            curl \
              -sS \
              -o /tmp/websub-response.txt \
              -w "%{http_code}" \
              -X POST \
              "https://pubsubhubbub.appspot.com/" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "hub.mode=publish" \
              --data-urlencode "hub.url=$FEED_URL"
          )"

          cat /tmp/websub-response.txt || true

          echo
          echo "WebSub HTTP status: $status"

          test "$status" = "204"
